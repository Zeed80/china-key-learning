services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: china_key_learning
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change-me-before-public-use}
      DATABASE_URL: postgresql+psycopg://app:app@postgres:5432/china_key_learning
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    depends_on:
      - postgres
      - redis
    ports:
      - "8001:8001"
    command: sh -c "python -m app.db.seed --admin-email \"$${ADMIN_EMAIL}\" --admin-password \"$${ADMIN_PASSWORD}\" && uvicorn app.main:app --host 0.0.0.0 --port 8001"

  frontend:
    build:
      context: ../frontend
    environment:
      VITE_API_URL: http://localhost:8001
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres-data:
